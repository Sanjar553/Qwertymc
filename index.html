            <div id="world-list"></div>
            <button class="btn" onclick="createNewWorld('survival')" style="background:#5cb85c">Yangi Survival</button>
            <button class="btn" onclick="createNewWorld('creative')" style="background:#4facfe">Yangi Creative</button>
            <button class="btn" onclick="backToMain()">Orqaga</button>
        </div>
    </div>

    <div id="settings-menu" class="overlay hidden">
        <div class="menu-card">
            <div class="title">SOZLAMALAR</div>
            <p>O'yinchi skini:</p>
            <div class="skin-container">
                <div class="skin-opt active" style="background:#1E90FF" onclick="setSkin('#1E90FF', this)"></div>
                <div class="skin-opt" style="background:#FF4500" onclick="setSkin('#FF4500', this)"></div>
                <div class="skin-opt" style="background:#32CD32" onclick="setSkin('#32CD32', this)"></div>
                <div class="skin-opt" style="background:#FFD700" onclick="setSkin('#FFD700', this)"></div>
            </div>
            <button class="btn" onclick="backToMain()">Saqlash</button>
        </div>
    </div>

    <div id="inventory-ui">
        <div id="inv-grid" style="display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px;"></div>
        <div class="crafting-panel">
            <h3>Crafting</h3>
            <div id="craft-list" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>
        <p style="font-size:11px; color:#aaa; margin-top:15px;">[E] - Inventarni yopish</p>
    </div>

    <div id="game-hud" class="hidden">
        <div id="hotbar"></div>
    </div>

    <canvas id="gameCanvas" width="807" height="425"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const TILE_SIZE = 40;
        const WORLD_WIDTH = 150;
        const WORLD_HEIGHT = 80;
        
        const BLOCKS = { AIR: 0, DIRT: 1, GRASS: 2, STONE: 3, WOOD: 4, LEAVES: 5, PLANKS: 6, STICK: 10, PICKAXE: 11, AXE: 12 };
        const BLOCK_DATA = {
            0: { name: "Havo", color: "transparent", strength: 0 },
            1: { name: "Tuproq", color: "#8B4513", strength: 10 },
            2: { name: "O't", color: "#3CB371", strength: 10 },
            3: { name: "Tosh", color: "#808080", strength: 50, tool: 'pickaxe' },
            4: { name: "Yog'och", color: "#5C4033", strength: 25, tool: 'axe' },
            5: { name: "Barg", color: "#2E8B57", strength: 5 },
            6: { name: "Taxta", color: "#DEB887", strength: 15 },
            10: { name: "Tayoq", color: "#966F33", isItem: true },
            11: { name: "Kirka", color: "#C0C0C0", isItem: true, power: 'pickaxe' },
            12: { name: "Bolta", color: "#C0C0C0", isItem: true, power: 'axe' }
        };

        const RECIPES = [
            { id: BLOCKS.PLANKS, needs: [{ id: BLOCKS.WOOD, qty: 1 }], resultQty: 4 },
            { id: BLOCKS.STICK, needs: [{ id: BLOCKS.PLANKS, qty: 2 }], resultQty: 4 },
            { id: BLOCKS.PICKAXE, needs: [{ id: BLOCKS.STICK, qty: 2 }, { id: BLOCKS.STONE, qty: 3 }], resultQty: 1 },
            { id: BLOCKS.AXE, needs: [{ id: BLOCKS.STICK, qty: 2 }, { id: BLOCKS.PLANKS, qty: 3 }], resultQty: 1 }
        ];

        let state = {
            active: false,
            mode: 'survival',
            worldName: 'World1',
            world: [],
            player: { 
                x: 0, y: 0, vx: 0, vy: 0, skin: '#1E90FF', inventory: [], 
                walkCycle: 0, squash: 1, stretch: 1 
            },
            camera: { x: 0, y: 0 },
            selectedSlot: 0,
            breaking: { x: -1, y: -1, progress: 0 },
            inventoryOpen: false,
            particles: [],
            placeAnims: [] // {x, y, scale}
        };

        const keys = {};

        function showWorldMenu() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('world-menu').classList.remove('hidden');
            renderWorldList();
        }

        function showSkinMenu() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.remove('hidden');
        }

        function backToMain() {
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function setSkin(color, el) {
            state.player.skin = color;
            document.querySelectorAll('.skin-opt').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function renderWorldList() {
            const list = document.getElementById('world-list');
            list.innerHTML = '';
            const worlds = JSON.parse(localStorage.getItem('mc_worlds_v2') || '{}');
            Object.keys(worlds).forEach(name => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.textContent = `${name} (${worlds[name].mode})`;
                b.onclick = () => loadWorld(name);
                list.appendChild(b);
            });
        }

        function createNewWorld(mode) {
            const name = "Dunyo_" + Date.now().toString().slice(-4);
            state.mode = mode;
            state.worldName = name;
            generateWorld();
            state.player.inventory = (mode === 'creative') 
                ? Object.keys(BLOCKS).filter(k => BLOCKS[k] !== 0).map(k => ({ id: BLOCKS[k], qty: 64 })) 
                : [];
            saveWorld();
            startGame();
        }

        function saveWorld() {
            const worlds = JSON.parse(localStorage.getItem('mc_worlds_v2') || '{}');
            worlds[state.worldName] = {
                mode: state.mode,
                world: state.world,
                player: state.player
            };
            localStorage.setItem('mc_worlds_v2', JSON.stringify(worlds));
        }

        function loadWorld(name) {
            const worlds = JSON.parse(localStorage.getItem('mc_worlds_v2'));
            const data = worlds[name];
            state.worldName = name;
            state.mode = data.mode;
            state.world = data.world;
            state.player = data.player;
            startGame();
        }

        function generateWorld() {
            state.world = Array.from({ length: WORLD_WIDTH }, () => new Array(WORLD_HEIGHT).fill(BLOCKS.AIR));
            for (let x = 0; x < WORLD_WIDTH; x++) {
                let h = 40 + Math.floor(Math.sin(x * 0.08) * 8);
                for (let y = 0; y < WORLD_HEIGHT; y++) {
                    if (y > h + 7) state.world[x][y] = BLOCKS.STONE;
                    else if (y > h) state.world[x][y] = BLOCKS.DIRT;
                    else if (y === h) state.world[x][y] = BLOCKS.GRASS;
                }
                if (x > 5 && x < WORLD_WIDTH - 5 && Math.random() < 0.06) {
                    let th = 4 + Math.floor(Math.random() * 2);
                    for (let i = 1; i <= th; i++) if(h-i >= 0) state.world[x][h-i] = BLOCKS.WOOD;
                    for (let lx = -2; lx <= 2; lx++) {
                        for (let ly = -2; ly <= 1; ly++) {
                            let wx = x + lx, wy = h - th + ly;
                            if (wx >= 0 && wx < WORLD_WIDTH && wy >= 0 && wy < WORLD_HEIGHT) {
                                if (state.world[wx][wy] === BLOCKS.AIR && Math.abs(lx) + Math.abs(ly) < 4) state.world[wx][wy] = BLOCKS.LEAVES;
                            }
                        }
                    }
                }
            }
            state.player.x = (WORLD_WIDTH * TILE_SIZE) / 2;
            state.player.y = 0;
        }

        function startGame() {
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            document.getElementById('game-hud').classList.remove('hidden');
            state.active = true;
            resize();
            updateHotbarUI();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if(!state.active) return;
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if(state.inventoryOpen) return;

            const p = state.player;
            let moving = false;
            p.vx = 0;
            if(keys['a']) { p.vx = -5; moving = true; }
            if(keys['d']) { p.vx = 5; moving = true; }
            
            if(moving) p.walkCycle += 0.15;
            else p.walkCycle = 0;

            p.vy += 0.55; 

            if(!checkCol(p.x + p.vx, p.y)) p.x += p.vx;
            if(!checkCol(p.x, p.y + p.vy)) {
                p.y += p.vy;
            } else {
                if(p.vy > 5) { p.squash = 0.7; p.stretch = 1.3; } // Qattiq tushish effekti
                if(p.vy > 0 && (keys[' '] || keys['w'])) {
                    p.vy = -11;
                    p.squash = 1.4; p.stretch = 0.7;
                }
                else p.vy = 0;
            }

            p.squash += (1 - p.squash) * 0.15;
            p.stretch += (1 - p.stretch) * 0.15;

            // Yumshoq kamera
            state.camera.x += (p.x - canvas.width/2 - state.camera.x) * 0.08;
            state.camera.y += (p.y - canvas.height/2 - state.camera.y) * 0.08;

            handleInteraction();
            updateParticles();
            updatePlaceAnims();
        }

        function updateParticles() {
            for(let i = state.particles.length - 1; i >= 0; i--) {
                let pt = state.particles[i];
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.vy += 0.2;
                pt.life -= 0.02;
                if(pt.life <= 0) state.particles.splice(i, 1);
            }
        }

        function updatePlaceAnims() {
            for(let i = state.placeAnims.length - 1; i >= 0; i--) {
                state.placeAnims[i].scale += (1 - state.placeAnims[i].scale) * 0.2;
                if(state.placeAnims[i].scale > 0.99) state.placeAnims.splice(i, 1);
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<6; i++) {
                state.particles.push({
                    x: x + TILE_SIZE/2, y: y + TILE_SIZE/2,
                    vx: (Math.random()-0.5)*5, vy: (Math.random()-0.8)*5,
                    color: color, life: 1.0, size: Math.random()*5 + 2
                });
            }
        }

        function checkCol(x, y) {
            let x1 = Math.floor(x / TILE_SIZE), x2 = Math.floor((x + 24) / TILE_SIZE);
            let y1 = Math.floor(y / TILE_SIZE), y2 = Math.floor((y + 58) / TILE_SIZE);
            for(let i=x1; i<=x2; i++) {
                for(let j=y1; j<=y2; j++) {
                    if(state.world[i]?.[j] && state.world[i][j] !== BLOCKS.AIR) return true;
                }
            }
            return false;
        }

        function handleInteraction() {
            if(keys['mousedown0']) {
                let bx = Math.floor((mouse.x + state.camera.x) / TILE_SIZE);
                let by = Math.floor((mouse.y + state.camera.y) / TILE_SIZE);
                let b = state.world[bx]?.[by];

                if(b && b !== BLOCKS.AIR) {
                    if(state.mode === 'creative') {
                        createParticles(bx*TILE_SIZE, by*TILE_SIZE, BLOCK_DATA[b].color);
                        state.world[bx][by] = BLOCKS.AIR;
                    } else {
                        let tool = getActiveTool();
                        let speed = (tool && tool.power === BLOCK_DATA[b].tool) ? 6 : 1.2;
                        
                        if(state.breaking.x === bx && state.breaking.y === by) {
                            state.breaking.progress += speed;
                            if(Math.random() < 0.1) createParticles(bx*TILE_SIZE, by*TILE_SIZE, BLOCK_DATA[b].color);
                            
                            if(state.breaking.progress >= BLOCK_DATA[b].strength) {
                                createParticles(bx*TILE_SIZE, by*TILE_SIZE, BLOCK_DATA[b].color);
                                addToInventory(b, 1);
                                state.world[bx][by] = BLOCKS.AIR;
                                state.breaking.progress = 0;
                                saveWorld();
                            }
                        } else {
                            state.breaking = { x: bx, y: by, progress: 0 };
                        }
                    }
                }
            } else { state.breaking.progress = 0; }
        }

        function getActiveTool() {
            let item = state.player.inventory[state.selectedSlot];
            return item ? BLOCK_DATA[item.id] : null;
        }

        function addToInventory(id, qty) {
            let item = state.player.inventory.find(i => i.id === id);
            if(item) item.qty += qty;
            else state.player.inventory.push({ id, qty });
            updateHotbarUI();
        }

        function updateHotbarUI() {
            const hb = document.getElementById('hotbar');
            hb.innerHTML = '';
            for(let i=0; i<9; i++) {
                const slot = document.createElement('div');
                slot.className = `hb-slot ${i === state.selectedSlot ? 'active' : ''}`;
                let item = state.player.inventory[i];
                if(item) {
                    slot.style.backgroundColor = BLOCK_DATA[item.id].color;
                    slot.innerHTML = `<span class="inv-count">${item.qty}</span>`;
                }
                hb.appendChild(slot);
            }
        }

        function toggleInventory() {
            state.inventoryOpen = !state.inventoryOpen;
            const ui = document.getElementById('inventory-ui');
            ui.style.display = state.inventoryOpen ? 'block' : 'none';
            if(state.inventoryOpen) renderInventory();
        }

        function renderInventory() {
            const grid = document.getElementById('inv-grid'); grid.innerHTML = '';
            state.player.inventory.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.style.backgroundColor = BLOCK_DATA[item.id].color;
                slot.innerHTML = `<div class="inv-count">${item.qty}</div>`;
                grid.appendChild(slot);
            });

            const clist = document.getElementById('craft-list'); clist.innerHTML = '';
            RECIPES.forEach(recipe => {
                let canCraft = recipe.needs.every(n => (state.player.inventory.find(i => i.id === n.id)?.qty || 0) >= n.qty);
                const btn = document.createElement('button');
                btn.className = 'btn'; btn.style.width = 'auto'; btn.style.fontSize = '12px';
                btn.textContent = `${BLOCK_DATA[recipe.id].name} yasash`;
                btn.disabled = !canCraft;
                btn.onclick = () => craftItem(recipe);
                clist.appendChild(btn);
            });
        }

        function craftItem(recipe) {
            recipe.needs.forEach(n => state.player.inventory.find(i => i.id === n.id).qty -= n.qty);
            state.player.inventory = state.player.inventory.filter(i => i.qty > 0);
            addToInventory(recipe.id, recipe.resultQty);
            renderInventory(); updateHotbarUI(); saveWorld();
        }

        function render() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#4facfe'); sky.addColorStop(1, '#00f2fe');
            ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.save();
            ctx.translate(-Math.floor(state.camera.x), -Math.floor(state.camera.y));

            let x1 = Math.max(0, Math.floor(state.camera.x / TILE_SIZE)), x2 = Math.min(WORLD_WIDTH, x1 + Math.ceil(canvas.width / TILE_SIZE) + 1);
            let y1 = Math.max(0, Math.floor(state.camera.y / TILE_SIZE)), y2 = Math.min(WORLD_HEIGHT, y1 + Math.ceil(canvas.height / TILE_SIZE) + 1);

            for(let x=x1; x<x2; x++) {
                for(let y=y1; y<y2; y++) {
                    let b = state.world[x][y];
                    if(b !== BLOCKS.AIR) {
                        ctx.save();
                        ctx.translate(x*TILE_SIZE + TILE_SIZE/2, y*TILE_SIZE + TILE_SIZE/2);
                        
                        // Sindirish tebranishi
                        if(state.breaking.x === x && state.breaking.y === y && state.breaking.progress > 0) {
                            let shake = (state.breaking.progress / BLOCK_DATA[b].strength) * 5;
                            ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
                        }

                        // Qo'yish animatsiyasi
                        let pa = state.placeAnims.find(a => a.x === x && a.y === y);
                        if(pa) ctx.scale(pa.scale, pa.scale);

                        ctx.fillStyle = BLOCK_DATA[b].color;
                        ctx.fillRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.strokeRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                        
                        if(state.breaking.x === x && state.breaking.y === y && state.breaking.progress > 0) {
                            ctx.fillStyle = `rgba(0,0,0,${state.breaking.progress / BLOCK_DATA[b].strength * 0.7})`;
                            ctx.fillRect(-TILE_SIZE/2, -TILE_SIZE/2, TILE_SIZE, TILE_SIZE);
                        }
                        ctx.restore();
                    }
                }
            }

            state.particles.forEach(pt => {
                ctx.globalAlpha = pt.life;
                ctx.fillStyle = pt.color;
                ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
            });
            ctx.globalAlpha = 1.0;

            // O'yinchi chizish (Animatsiya bilan)
            const p = state.player;
            ctx.save();
            let bob = Math.sin(p.walkCycle) * 3;
            ctx.translate(p.x + 12, p.y + 60);
            ctx.scale(p.stretch, p.squash);
            ctx.fillStyle = p.skin;
            ctx.fillRect(-12, -60 + bob, 24, 60);
            // Ko'zlar
            ctx.fillStyle = "white";
            ctx.fillRect(2, -50 + bob, 6, 6);
            ctx.restore();

            ctx.restore();
        }

        function downloadServerFile() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'minecraft_server.html'; a.click();
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

        const mouse = { x:0, y:0 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', e => {
            if(e.button === 0) keys['mousedown0'] = true;
            if(e.button === 2 && state.active && !state.inventoryOpen) placeBlock();
        });
        window.addEventListener('mouseup', e => { if(e.button === 0) keys['mousedown0'] = false; });
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if(e.key === 'e') toggleInventory();
            if(e.key >= '1' && e.key <= '9') { state.selectedSlot = parseInt(e.key) - 1; updateHotbarUI(); }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('resize', resize);

        function placeBlock() {
            let bx = Math.floor((mouse.x + state.camera.x) / TILE_SIZE), by = Math.floor((mouse.y + state.camera.y) / TILE_SIZE);
            let invItem = state.player.inventory[state.selectedSlot];
            if(invItem && !BLOCK_DATA[invItem.id].isItem && state.world[bx]?.[by] === BLOCKS.AIR) {
                let dist = Math.hypot(state.player.x + 12 - (bx*TILE_SIZE + 20), state.player.y + 30 - (by*TILE_SIZE + 20));
                if(dist < TILE_SIZE * 5) {
                    state.world[bx][by] = invItem.id;
                    state.placeAnims.push({ x: bx, y: by, scale: 0.2 });
                    if(state.mode === 'survival') {
                        invItem.qty--; state.player.inventory = state.player.inventory.filter(i => i.qty > 0);
                    }
                    updateHotbarUI(); saveWorld();
                }
            }
        }
    </script>

</body></html>
